name: EAS Build iOS

# Production iOS App Store build (.ipa). Manual dispatch only.
# Use this to queue a standalone iOS store build without touching Android.
# Distribution credentials must already be configured on EAS for headless use.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eas-build-ios
  cancel-in-progress: true

env:
  BUN_VERSION: "1.2.19"

jobs:
  build:
    name: Build iOS app (.ipa) on EAS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bun run mobile:typecheck

      - name: Prepare App Store Connect API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          printf '%s' "$ASC_PRIVATE_KEY" > "$RUNNER_TEMP/asc-api-key.p8"
          chmod 600 "$RUNNER_TEMP/asc-api-key.p8"

      # The marketing version is committed in app.json. EAS manages the store
      # build number remotely through autoIncrement and appVersionSource.
      # Running from the app directory lets EAS include the complete monorepo.
      - name: Build iOS app (.ipa) on EAS
        working-directory: mobile/app
        env:
          EXPO_ASC_API_KEY_PATH: ${{ runner.temp }}/asc-api-key.p8
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_APPLE_TEAM_TYPE: ${{ secrets.EXPO_APPLE_TEAM_TYPE }}
        run: eas build --platform ios --profile production --non-interactive --no-wait
