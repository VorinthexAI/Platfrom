name: CI

# Pre-merge required checks. Runs on every PR (and pushes to main as a backstop)
# so broken code is caught BEFORE it reaches production. Make this a required
# status check in branch protection on `main`.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.2.19"

jobs:
  verify:
    name: Lint / typecheck / build / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Next build
        uses: actions/cache@v4
        with:
          path: web/app/.next/cache
          key: next-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            next-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Web lint
        run: bun run web:lint

      - name: Web typecheck
        run: bun run web:typecheck

      - name: Web build
        run: bun run web:build

      - name: Backend check
        run: bun run backend:check

      - name: Backend test
        run: bun run backend:test

  docker:
    name: Build Docker images (no push)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/app/Dockerfile
          push: false
          load: false
          tags: vorinthex-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/deploy/Dockerfile
          target: runtime
          push: false
          load: false
          tags: vorinthex-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
