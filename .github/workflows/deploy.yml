name: Unified Deploy

# Production deploy pipeline. Vercel has been fully removed — the Next.js web app
# and the Bun backend both ship as container images to Amazon ECR and roll out on
# the shared ECS cluster (vorinthex-production) behind the ALB.
#
# Flow:
#   merge to main  ->  Build  ->  Test  ->  Docker Buildx  ->  Push ECR (web + backend)
#                  ->  [Terraform Plan / Approval / Apply is owned by infra.yml]
#                  ->  ECS Rolling Deploy (force-new-deployment + wait services-stable + health smoke)
#                  ->  Early-infra blue-green (SSM) while the ECS cluster is INACTIVE
#
# While ECS is not provisioned yet, production traffic is served by the
# single-box early-infra stack (web + api + redis + caddy behind Caddy). The
# ECS rollout steps no-op in that state, and the `early-deploy` job performs
# the same SSM blue-green swap as early-infra.yml so every merge to main still
# reaches production. Once the cluster/service become ACTIVE the roles flip:
# ECS rolls and `early-deploy` no-ops.
#
# `early-infra-standalone` also invokes early-infra.yml directly (as a
# reusable workflow) on every merge, deliberately in addition to
# `early-deploy` — a second independent build + blue-green swap against the
# same box. Kept intentionally duplicated rather than sequenced or merged.
#
# The GitHub `production` environment provides the manual approval gate.
# Infrastructure provisioning (Terraform plan/apply) lives in infra.yml, not here.

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        type: choice
        options: [all, web, backend, selective]
        default: all
      deploy:
        description: 'Deploy after verification'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-north-1
  ECS_CLUSTER: vorinthex-production
  ECS_WEB_SERVICE: vorinthex-prod-web
  ECS_API_SERVICE: vorinthex-prod-api
  ECR_WEB_REPOSITORY: vorinthex-web
  ECR_BACKEND_REPOSITORY: vorinthex-backend
  # ECS task defs (web + api) run on ARM (t4g) capacity, so images are built for arm64.
  IMAGE_PLATFORM: linux/arm64
  COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
  SSM_PATH: /vorinthex/prod/

jobs:
  changes:
    name: Select deploy targets
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    outputs:
      web: ${{ steps.decide.outputs.web }}
      backend: ${{ steps.decide.outputs.backend }}
      changed_files: ${{ steps.decide.outputs.changed_files }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      - name: Decide affected services
        id: decide
        run: |
          set -euo pipefail

          map_file() {
            case "$1" in
              web/app/*) web=true ;;
              backend/*) backend=true ;;
              shared/*) shared=true ;;
              environments/scripts/cloudflare-cache-policy.ts) web=true ;;
              environments/backend/db.seeds.secrets.json) backend=true ;;
              .github/workflows/deploy.yml) web=true ;;
              deploy/early/*) web=true ;;
            esac
          }

          web=false
          backend=false
          shared=false
          files=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.target }}" in
              all)
                web=true
                backend=true
                ;;
              web)
                web=true
                ;;
              backend)
                backend=true
                ;;
              selective)
                files="$(git diff --name-only HEAD~1 HEAD || true)"
                while IFS= read -r file; do
                  [ -n "$file" ] || continue
                  map_file "$file"
                done <<< "$files"
                ;;
            esac
          else
            base='${{ github.event.pull_request.base.sha }}'
            files="$(git diff --name-only "$base" "${{ env.COMMIT_SHA }}")"
            while IFS= read -r file; do
              [ -n "$file" ] || continue
              map_file "$file"
            done <<< "$files"
          fi

          # shared/ is consumed by BOTH the web app and the backend.
          if [ "$shared" = true ]; then web=true; backend=true; fi

          {
            echo "web=$web"
            echo "backend=$backend"
            echo "changed_files<<EOF"
            printf '%s\n' "${files:-manual:${{ inputs.target || 'all' }}}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  sync-configs:
    name: Sync configs to GitHub
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      (needs.changes.outputs.web == 'true' || needs.changes.outputs.backend == 'true')
      && (github.event_name == 'pull_request' || inputs.deploy)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}
      - name: Unlock encrypted environments/**/.env.* files
        env:
          GIT_CRYPT_KEY_B64: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          if [ -z "$GIT_CRYPT_KEY_B64" ]; then
            echo "::warning::GIT_CRYPT_KEY is not configured; continuing because production env values are provided by GitHub/AWS SSM secrets."
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y git-crypt
          echo "$GIT_CRYPT_KEY_B64" | base64 -d > /tmp/git-crypt.key
          git-crypt unlock /tmp/git-crypt.key
          rm -f /tmp/git-crypt.key
      - name: Sync .github/.configs/vars.json to repo Variables
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          test -n "$GH_TOKEN" || { echo "::error::GH_PAT is not configured (needed to manage repo Variables/Secrets — the default GITHUB_TOKEN can't)."; exit 1; }
          bash environments/scripts/sync-configs.sh vars

  verify-web:
    name: Verify web
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --linker=hoisted
      - name: Lint
        run: bun run web:lint
      - name: Typecheck
        run: bun run web:typecheck

  verify-backend:
    name: Verify backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --linker=hoisted
      - name: Typecheck
        run: bun run backend:check
      - name: Test
        run: bun run backend:test

  # ---------------------------------------------------------------------------
  # WEB: build the Next standalone image, push to ECR (vorinthex-web), and roll
  # the vorinthex-prod-web ECS service. ONE image serves every subdomain
  # (orbit/hunt/...) — routing happens inside the app via web/app/src/proxy.ts.
  # Replaces the three former Vercel jobs (deploy-vorinthex / -orbit / -hunt).
  # ---------------------------------------------------------------------------
  deploy-web:
    name: Build image and roll web ECS service
    runs-on: ubuntu-latest
    needs: [changes, sync-configs, verify-web]
    if: needs.changes.outputs.web == 'true' && (github.event_name == 'pull_request' || inputs.deploy)
    environment: production
    env:
      SITE_URL: ${{ fromJSON(secrets.CONFIG).vorinthex.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_WEB_REPOSITORY" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$ECR_WEB_REPOSITORY" --image-scanning-configuration scanOnPush=true --image-tag-mutability MUTABLE

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image reference
        id: meta
        run: echo "image=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB_REPOSITORY }}:${{ env.COMMIT_SHA }}" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/app/Dockerfile
          platforms: ${{ env.IMAGE_PLATFORM }}
          push: true
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ env.SITE_URL }}
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB_REPOSITORY }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web,ignore-error=true
          provenance: false

      - name: Roll web ECS service
        run: |
          CLUSTER_STATUS=$(aws ecs describe-clusters \
            --clusters "$ECS_CLUSTER" \
            --query 'clusters[0].status' \
            --output text 2>/dev/null || echo INACTIVE)
          if [ "$CLUSTER_STATUS" != "ACTIVE" ]; then
            echo "::notice::Skipping ECS web rollout because cluster $ECS_CLUSTER is $CLUSTER_STATUS. Current production traffic is served by early-infra/Caddy."
            exit 0
          fi

          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_WEB_SERVICE" \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo INACTIVE)
          if [ "$SERVICE_STATUS" != "ACTIVE" ]; then
            echo "::notice::Skipping ECS web rollout because service $ECS_WEB_SERVICE is $SERVICE_STATUS. Current production traffic is served by early-infra/Caddy."
            exit 0
          fi

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_WEB_SERVICE" \
            --force-new-deployment \
            --query 'service.serviceName' --output text
          echo "Waiting for $ECS_WEB_SERVICE to reach a steady state..."
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_WEB_SERVICE"

      - name: Web health smoke check
        env:
          PRODUCTION_URL: ${{ env.SITE_URL }}
        run: |
          URL="${PRODUCTION_URL:-https://www.vorinthex.com}"
          for i in $(seq 1 24); do
            CODE=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Web is live (HTTP 200) at $URL on attempt $i/24"
              exit 0
            fi
            echo "attempt $i/24: HTTP $CODE; retrying in 10s"
            sleep 10
          done
          echo "::error::Web health check failed after 4 minutes ($URL)"
          exit 1

  cloudflare-cache:
    name: Purge Cloudflare cache
    runs-on: ubuntu-latest
    # Runs after early-deploy too — purging before the early-infra box swaps
    # colors would just refill the cache with the old build.
    needs: [changes, deploy-web, early-deploy]
    if: >-
      always()
      && needs.changes.outputs.web == 'true'
      && (github.event_name == 'pull_request' || inputs.deploy)
      && needs.deploy-web.result == 'success'
      && needs.early-deploy.result == 'success'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - uses: oven-sh/setup-bun@v2

      - name: Apply Cloudflare cache policy and purge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
        run: bun environments/scripts/cloudflare-cache-policy.ts

  # ---------------------------------------------------------------------------
  # BACKEND
  # ---------------------------------------------------------------------------
  backend-secrets:
    name: Sync backend secrets
    runs-on: ubuntu-latest
    needs: [changes, sync-configs, verify-backend]
    if: needs.changes.outputs.backend == 'true' && (github.event_name == 'pull_request' || inputs.deploy)
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync config.env into SSM
        env:
          CONFIG_ENV: ${{ toJSON(fromJSON(secrets.CONFIG).env) }}
        run: |
          test -n "$CONFIG_ENV" && [ "$CONFIG_ENV" != "null" ] || { echo "::error::config.env is not configured."; exit 1; }
          count=0
          skipped=0
          while IFS= read -r entry; do
            key=$(printf '%s' "$entry" | jq -r '.key')
            value=$(printf '%s' "$entry" | jq -r '.value // ""')
            case "$key" in PROD_SSH_*|PROD_ARANGO_*|APP_HOST_PUBLIC_IP) skipped=$((skipped + 1)); continue ;; esac
            if ! printf '%s' "$key" | grep -Eq '^[A-Z][A-Z0-9_]*$'; then
              echo "::error::Invalid config.env key '$key'."
              exit 1
            fi
            if [ -z "$value" ]; then skipped=$((skipped + 1)); continue; fi
            aws ssm put-parameter --region "$AWS_REGION" --name "${SSM_PATH}${key}" --type SecureString --value "$value" --overwrite >/dev/null
            count=$((count + 1))
          done < <(echo "$CONFIG_ENV" | jq -c 'to_entries[]')
          echo "Synced $count parameter(s) to $SSM_PATH, skipped $skipped value(s)"

  backend-image:
    name: Build and push backend image
    runs-on: ubuntu-latest
    needs: [changes, verify-backend]
    if: needs.changes.outputs.backend == 'true' && (github.event_name == 'pull_request' || inputs.deploy)
    environment: production
    outputs:
      image: ${{ steps.meta.outputs.image }}
      registry: ${{ steps.ecr-login.outputs.registry }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_BACKEND_REPOSITORY" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$ECR_BACKEND_REPOSITORY" --image-scanning-configuration scanOnPush=true --image-tag-mutability MUTABLE
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Compute image reference
        id: meta
        run: echo "image=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND_REPOSITORY }}:${{ env.COMMIT_SHA }}" >> "$GITHUB_OUTPUT"
      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/deploy/Dockerfile
          target: runtime
          platforms: ${{ env.IMAGE_PLATFORM }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND_REPOSITORY }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend,ignore-error=true
          provenance: false

  # NOTE (migrate/seed): ArangoDB lives on its own PRIVATE EC2 and is reached
  # through an SSH tunnel. This path is intentionally kept (it is NOT a Vercel
  # dependency). It could not be safely moved to `aws ecs run-task` because the
  # runtime image only ships backend/src (not backend/scripts), so polar:sync and
  # seed:secrets are unavailable inside the api image, and seed:secrets also needs
  # the git-crypt-encrypted environments/backend/db.seeds.secrets.json which is not
  # baked into any image. Schema migrate + node seed + Polar sync therefore keep
  # running from a full checkout over the tunnel.
  backend-db:
    name: Deploy graph database
    runs-on: ubuntu-latest
    needs: [changes, backend-secrets]
    if: needs.changes.outputs.backend == 'true' && (github.event_name == 'pull_request' || inputs.deploy)
    environment: production
    env:
      EC2_HOST: ${{ secrets.GRAPH_DB_EC2_HOST }}
      EC2_USER: ${{ secrets.GRAPH_DB_EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.GRAPH_DB_EC2_SSH_KEY }}
      EC2_SSH_KEY_B64: ${{ secrets.GRAPH_DB_EC2_SSH_KEY_B64 }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      # The graph-db SG has no standing SSH ingress (Wave 0 lockdown). Each
      # job opens port 22 for its own runner IP and closes it when done.
      - name: Open SSH ingress for this runner
        run: |
          set -euo pipefail
          test -n "${{ vars.GRAPH_DB_SSH_SG_ID }}" || { echo "::error::GRAPH_DB_SSH_SG_ID repo variable is not set (see .github/.configs/vars.json)."; exit 1; }
          RUNNER_IP="$(curl -fsS https://checkip.amazonaws.com)"
          echo "RUNNER_IP=$RUNNER_IP" >> "$GITHUB_ENV"
          if ! out=$(aws ec2 authorize-security-group-ingress \
            --group-id "${{ vars.GRAPH_DB_SSH_SG_ID }}" \
            --ip-permissions "[{\"IpProtocol\":\"tcp\",\"FromPort\":22,\"ToPort\":22,\"IpRanges\":[{\"CidrIp\":\"${RUNNER_IP}/32\",\"Description\":\"github-actions run ${GITHUB_RUN_ID}\"}]}]" 2>&1); then
            if echo "$out" | grep -q "InvalidPermission.Duplicate"; then
              echo "SSH ingress rule already exists for ${RUNNER_IP}/32."
            else
              echo "::error::Could not authorize SSH ingress for ${RUNNER_IP}/32: $out"
              exit 1
            fi
          fi
          # Wait until port 22 actually answers (SG propagation) so SSH steps
          # fail fast with a clear cause instead of a 2-minute timeout.
          HOST="$(python3 -c 'import os; print(os.environ["EC2_HOST"].lstrip("﻿").strip())')"
          for i in $(seq 1 30); do
            if timeout 3 bash -c "exec 3<>/dev/tcp/${HOST}/22" 2>/dev/null; then
              echo "Port 22 on the graph-db host is reachable."
              exit 0
            fi
            sleep 3
          done
          echo "::error::Port 22 on the graph-db host is still unreachable 90s after authorizing ${RUNNER_IP}/32. Check the SG and instance state."
          exit 1
      - name: Set up SSH
        run: |
          EC2_HOST="$(python3 -c 'import os; print(os.environ["EC2_HOST"].lstrip("﻿").strip())')"
          EC2_USER="$(python3 -c 'import os; print(os.environ["EC2_USER"].lstrip("﻿").strip())')"
          export EC2_HOST EC2_USER
          mkdir -p ~/.ssh
          if [ -n "${EC2_SSH_KEY_B64:-}" ]; then
            python3 - <<'PY' > ~/.ssh/deploy_key
          import base64
          import os
          import sys

          key_b64 = "".join(os.environ.get("EC2_SSH_KEY_B64", "").split())
          print(f"Using EC2_SSH_KEY_B64 ({len(key_b64)} chars, mod4={len(key_b64) % 4})", file=sys.stderr)
          try:
              sys.stdout.buffer.write(base64.b64decode(key_b64, validate=True))
          except Exception as exc:
              sys.exit(f"Invalid EC2_SSH_KEY_B64: {exc}")
          PY
          else
            python3 - <<'PY' > ~/.ssh/deploy_key
          import os
          import sys

          key = os.environ.get("EC2_SSH_KEY", "").strip()
          if not key:
              sys.exit("EC2_SSH_KEY is empty")
          key = key.replace("\\n", "\n").replace("\r\n", "\n").replace("\r", "\n")
          print(key)
          PY
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null || { echo "::error::EC2 SSH key is not a valid private key. Re-save the GitHub secret with the full PEM/OpenSSH private key or set the *_SSH_KEY_B64 secret."; exit 1; }
          ssh-keyscan -T 10 -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || echo "::warning::ssh-keyscan failed for graph database host; SSH will use accept-new."
          printf 'Host graphdbbox\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/deploy_key\n  IdentitiesOnly yes\n  StrictHostKeyChecking accept-new\n' "$EC2_HOST" "$EC2_USER" >> ~/.ssh/config
      - name: Copy graph-db compose file
        run: |
          ssh graphdbbox "mkdir -p ~/vorinthex-db"
          scp backend/deploy/docker-compose.db.yml graphdbbox:~/vorinthex-db/docker-compose.yml
      - name: Render .env from SSM
        run: |
          # @json double-quotes and escapes each value (embedded newlines become
          # literal "\n") so a multi-line SSM value stays on one physical line —
          # Docker Compose's env-file parser un-escapes \n back on load. Without
          # this, a value containing a raw newline splits across two lines and
          # the second half gets parsed as a bogus new KEY, e.g. "unexpected
          # character '+' in variable name".
          aws ssm get-parameters-by-path --region "$AWS_REGION" --path "$SSM_PATH" --recursive --with-decryption --query "Parameters[].{n:Name,v:Value}" --output json \
          | jq -r '.[] | (.n | sub("^.*/";"")) + "=" + (.v | @json)' > /tmp/graph-db.env
          test -s /tmp/graph-db.env || { echo "::error::No parameters found under $SSM_PATH"; exit 1; }
          scp /tmp/graph-db.env graphdbbox:~/vorinthex-db/.env
          rm -f /tmp/graph-db.env
      - name: Start ArangoDB
        run: ssh graphdbbox "cd ~/vorinthex-db && docker compose up -d --remove-orphans"
      - name: Close SSH ingress for this runner
        if: always()
        run: |
          if [ -n "${RUNNER_IP:-}" ]; then
            aws ec2 revoke-security-group-ingress \
              --group-id "${{ vars.GRAPH_DB_SSH_SG_ID }}" \
              --ip-permissions "[{\"IpProtocol\":\"tcp\",\"FromPort\":22,\"ToPort\":22,\"IpRanges\":[{\"CidrIp\":\"${RUNNER_IP}/32\"}]}]" \
              || echo "::warning::SSH ingress revoke failed; remove ${RUNNER_IP}/32 from the graph-db SG manually."
          fi

  backend-migrate:
    name: Migrate graph database
    runs-on: ubuntu-latest
    needs: [changes, backend-image, backend-db]
    if: needs.changes.outputs.backend == 'true' && (github.event_name == 'pull_request' || inputs.deploy)
    defaults:
      run:
        working-directory: backend
    environment: production
    env:
      EC2_HOST: ${{ secrets.GRAPH_DB_EC2_HOST }}
      EC2_USER: ${{ secrets.GRAPH_DB_EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.GRAPH_DB_EC2_SSH_KEY }}
      EC2_SSH_KEY_B64: ${{ secrets.GRAPH_DB_EC2_SSH_KEY_B64 }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile --linker=hoisted
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Open SSH ingress for this runner
        run: |
          set -euo pipefail
          test -n "${{ vars.GRAPH_DB_SSH_SG_ID }}" || { echo "::error::GRAPH_DB_SSH_SG_ID repo variable is not set (see .github/.configs/vars.json)."; exit 1; }
          RUNNER_IP="$(curl -fsS https://checkip.amazonaws.com)"
          echo "RUNNER_IP=$RUNNER_IP" >> "$GITHUB_ENV"
          if ! out=$(aws ec2 authorize-security-group-ingress \
            --group-id "${{ vars.GRAPH_DB_SSH_SG_ID }}" \
            --ip-permissions "[{\"IpProtocol\":\"tcp\",\"FromPort\":22,\"ToPort\":22,\"IpRanges\":[{\"CidrIp\":\"${RUNNER_IP}/32\",\"Description\":\"github-actions run ${GITHUB_RUN_ID}\"}]}]" 2>&1); then
            if echo "$out" | grep -q "InvalidPermission.Duplicate"; then
              echo "SSH ingress rule already exists for ${RUNNER_IP}/32."
            else
              echo "::error::Could not authorize SSH ingress for ${RUNNER_IP}/32: $out"
              exit 1
            fi
          fi
          # Wait until port 22 actually answers (SG propagation) so SSH steps
          # fail fast with a clear cause instead of a 2-minute timeout.
          HOST="$(python3 -c 'import os; print(os.environ["EC2_HOST"].lstrip("﻿").strip())')"
          for i in $(seq 1 30); do
            if timeout 3 bash -c "exec 3<>/dev/tcp/${HOST}/22" 2>/dev/null; then
              echo "Port 22 on the graph-db host is reachable."
              exit 0
            fi
            sleep 3
          done
          echo "::error::Port 22 on the graph-db host is still unreachable 90s after authorizing ${RUNNER_IP}/32. Check the SG and instance state."
          exit 1
      - name: Open SSH tunnel to ArangoDB
        run: |
          EC2_HOST="$(python3 -c 'import os; print(os.environ["EC2_HOST"].lstrip("﻿").strip())')"
          EC2_USER="$(python3 -c 'import os; print(os.environ["EC2_USER"].lstrip("﻿").strip())')"
          export EC2_HOST EC2_USER
          mkdir -p ~/.ssh
          if [ -n "${EC2_SSH_KEY_B64:-}" ]; then
            python3 - <<'PY' > ~/.ssh/deploy_key
          import base64
          import os
          import sys

          key_b64 = "".join(os.environ.get("EC2_SSH_KEY_B64", "").split())
          print(f"Using EC2_SSH_KEY_B64 ({len(key_b64)} chars, mod4={len(key_b64) % 4})", file=sys.stderr)
          try:
              sys.stdout.buffer.write(base64.b64decode(key_b64, validate=True))
          except Exception as exc:
              sys.exit(f"Invalid EC2_SSH_KEY_B64: {exc}")
          PY
          else
            python3 - <<'PY' > ~/.ssh/deploy_key
          import os
          import sys

          key = os.environ.get("EC2_SSH_KEY", "").strip()
          if not key:
              sys.exit("EC2_SSH_KEY is empty")
          key = key.replace("\\n", "\n").replace("\r\n", "\n").replace("\r", "\n")
          print(key)
          PY
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null || { echo "::error::EC2 SSH key is not a valid private key. Re-save the GitHub secret with the full PEM/OpenSSH private key or set the *_SSH_KEY_B64 secret."; exit 1; }
          ssh-keyscan -T 10 -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || echo "::warning::ssh-keyscan failed for graph database host; SSH will use accept-new."
          printf 'Host graphdbbox\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/deploy_key\n  IdentitiesOnly yes\n  StrictHostKeyChecking accept-new\n' "$EC2_HOST" "$EC2_USER" >> ~/.ssh/config
          ssh -f -N -L 8529:127.0.0.1:8529 graphdbbox
      - name: Fetch ArangoDB credentials from SSM
        run: |
          creds=$(aws ssm get-parameters-by-path --region "$AWS_REGION" --path "$SSM_PATH" --recursive --with-decryption --query "Parameters[].{n:Name,v:Value}" --output json)
          arango_password=$(echo "$creds" | jq -r '.[] | select(.n | endswith("/ARANGO_ROOT_PASSWORD")) | .v')
          arango_database=$(echo "$creds" | jq -r '.[] | select(.n | endswith("/ARANGO_DATABASE")) | .v')
          polar_access_token=$(echo "$creds" | jq -r '.[] | select(.n | endswith("/POLAR_ACCESS_TOKEN")) | .v')
          polar_server=$(echo "$creds" | jq -r '.[] | select(.n | endswith("/POLAR_SERVER")) | .v')
          test -n "$arango_password" || { echo "::error::ARANGO_ROOT_PASSWORD not found under $SSM_PATH"; exit 1; }
          test -n "$polar_access_token" || { echo "::error::POLAR_ACCESS_TOKEN not found under $SSM_PATH"; exit 1; }
          echo "::add-mask::$arango_password"
          echo "::add-mask::$polar_access_token"
          echo "ARANGO_ROOT_PASSWORD=$arango_password" >> "$GITHUB_ENV"
          echo "ARANGO_DATABASE=$arango_database" >> "$GITHUB_ENV"
          echo "POLAR_ACCESS_TOKEN=$polar_access_token" >> "$GITHUB_ENV"
          echo "POLAR_SERVER=${polar_server:-production}" >> "$GITHUB_ENV"
      - name: Apply migrations, seed nodes, and sync Polar products
        working-directory: .
        env:
          ARANGO_URL: http://127.0.0.1:8529
          ARANGO_USERNAME: root
        run: |
          bun run --cwd backend db:migrate:ci
          bun run --cwd backend seed.ts
          bun run --cwd backend polar:sync
      - name: Close SSH ingress for this runner
        if: always()
        run: |
          if [ -n "${RUNNER_IP:-}" ]; then
            aws ec2 revoke-security-group-ingress \
              --group-id "${{ vars.GRAPH_DB_SSH_SG_ID }}" \
              --ip-permissions "[{\"IpProtocol\":\"tcp\",\"FromPort\":22,\"ToPort\":22,\"IpRanges\":[{\"CidrIp\":\"${RUNNER_IP}/32\"}]}]" \
              || echo "::warning::SSH ingress revoke failed; remove ${RUNNER_IP}/32 from the graph-db SG manually."
          fi

  seed-db-secrets:
    name: Upsert db.seeds.secrets.json to production
    runs-on: ubuntu-latest
    needs: [changes, backend-migrate]
    if: needs.changes.outputs.backend == 'true' && (github.event_name == 'pull_request' || inputs.deploy)
    environment: production
    env:
      EC2_HOST: ${{ secrets.GRAPH_DB_EC2_HOST }}
      EC2_USER: ${{ secrets.GRAPH_DB_EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.GRAPH_DB_EC2_SSH_KEY }}
      EC2_SSH_KEY_B64: ${{ secrets.GRAPH_DB_EC2_SSH_KEY_B64 }}
      GIT_CRYPT_KEY_B64: ${{ secrets.GIT_CRYPT_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}
      - name: Unlock encrypted environments/**/.env.* and db.seeds.secrets.json
        run: |
          if [ -z "$GIT_CRYPT_KEY_B64" ]; then
            echo "::warning::GIT_CRYPT_KEY is not configured; continuing and seed step will skip if db.seeds.secrets.json is absent."
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y git-crypt
          echo "$GIT_CRYPT_KEY_B64" | base64 -d > /tmp/git-crypt.key
          git-crypt unlock /tmp/git-crypt.key
          rm -f /tmp/git-crypt.key
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --linker=hoisted
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Open SSH ingress for this runner
        run: |
          set -euo pipefail
          test -n "${{ vars.GRAPH_DB_SSH_SG_ID }}" || { echo "::error::GRAPH_DB_SSH_SG_ID repo variable is not set (see .github/.configs/vars.json)."; exit 1; }
          RUNNER_IP="$(curl -fsS https://checkip.amazonaws.com)"
          echo "RUNNER_IP=$RUNNER_IP" >> "$GITHUB_ENV"
          if ! out=$(aws ec2 authorize-security-group-ingress \
            --group-id "${{ vars.GRAPH_DB_SSH_SG_ID }}" \
            --ip-permissions "[{\"IpProtocol\":\"tcp\",\"FromPort\":22,\"ToPort\":22,\"IpRanges\":[{\"CidrIp\":\"${RUNNER_IP}/32\",\"Description\":\"github-actions run ${GITHUB_RUN_ID}\"}]}]" 2>&1); then
            if echo "$out" | grep -q "InvalidPermission.Duplicate"; then
              echo "SSH ingress rule already exists for ${RUNNER_IP}/32."
            else
              echo "::error::Could not authorize SSH ingress for ${RUNNER_IP}/32: $out"
              exit 1
            fi
          fi
          # Wait until port 22 actually answers (SG propagation) so SSH steps
          # fail fast with a clear cause instead of a 2-minute timeout.
          HOST="$(python3 -c 'import os; print(os.environ["EC2_HOST"].lstrip("﻿").strip())')"
          for i in $(seq 1 30); do
            if timeout 3 bash -c "exec 3<>/dev/tcp/${HOST}/22" 2>/dev/null; then
              echo "Port 22 on the graph-db host is reachable."
              exit 0
            fi
            sleep 3
          done
          echo "::error::Port 22 on the graph-db host is still unreachable 90s after authorizing ${RUNNER_IP}/32. Check the SG and instance state."
          exit 1
      - name: Open SSH tunnel to ArangoDB
        run: |
          EC2_HOST="$(python3 -c 'import os; print(os.environ["EC2_HOST"].lstrip("﻿").strip())')"
          EC2_USER="$(python3 -c 'import os; print(os.environ["EC2_USER"].lstrip("﻿").strip())')"
          export EC2_HOST EC2_USER
          mkdir -p ~/.ssh
          if [ -n "${EC2_SSH_KEY_B64:-}" ]; then
            python3 - <<'PY' > ~/.ssh/deploy_key
          import base64
          import os
          import sys

          key_b64 = "".join(os.environ.get("EC2_SSH_KEY_B64", "").split())
          print(f"Using EC2_SSH_KEY_B64 ({len(key_b64)} chars, mod4={len(key_b64) % 4})", file=sys.stderr)
          try:
              sys.stdout.buffer.write(base64.b64decode(key_b64, validate=True))
          except Exception as exc:
              sys.exit(f"Invalid EC2_SSH_KEY_B64: {exc}")
          PY
          else
            python3 - <<'PY' > ~/.ssh/deploy_key
          import os
          import sys

          key = os.environ.get("EC2_SSH_KEY", "").strip()
          if not key:
              sys.exit("EC2_SSH_KEY is empty")
          key = key.replace("\\n", "\n").replace("\r\n", "\n").replace("\r", "\n")
          print(key)
          PY
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null || { echo "::error::EC2 SSH key is not a valid private key. Re-save the GitHub secret with the full PEM/OpenSSH private key or set the *_SSH_KEY_B64 secret."; exit 1; }
          ssh-keyscan -T 10 -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || echo "::warning::ssh-keyscan failed for graph database host; SSH will use accept-new."
          printf 'Host graphdbbox\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/deploy_key\n  IdentitiesOnly yes\n  StrictHostKeyChecking accept-new\n' "$EC2_HOST" "$EC2_USER" >> ~/.ssh/config
          ssh -f -N -L 8529:127.0.0.1:8529 graphdbbox
      - name: Fetch ArangoDB credentials from SSM
        run: |
          creds=$(aws ssm get-parameters-by-path --region "$AWS_REGION" --path "$SSM_PATH" --recursive --with-decryption --query "Parameters[].{n:Name,v:Value}" --output json)
          arango_password=$(echo "$creds" | jq -r '.[] | select(.n | endswith("/ARANGO_ROOT_PASSWORD")) | .v')
          arango_database=$(echo "$creds" | jq -r '.[] | select(.n | endswith("/ARANGO_DATABASE")) | .v')
          test -n "$arango_password" || { echo "::error::ARANGO_ROOT_PASSWORD not found under $SSM_PATH"; exit 1; }
          echo "::add-mask::$arango_password"
          echo "ARANGO_ROOT_PASSWORD=$arango_password" >> "$GITHUB_ENV"
          echo "ARANGO_DATABASE=$arango_database" >> "$GITHUB_ENV"
      - name: Upsert db.seeds.secrets.json
        env:
          ARANGO_URL: http://127.0.0.1:8529
          ARANGO_USERNAME: root
          SEEDS_FILE: ${{ github.workspace }}/environments/backend/db.seeds.secrets.json
          DB_SEEDS_SECRETS_JSON_B64: ${{ secrets.DB_SEEDS_SECRETS_JSON_B64 }}
          DB_SEEDS_SECRETS_JSON: ${{ secrets.DB_SEEDS_SECRETS_JSON }}
        run: |
          # The checked-out file is git-crypt encrypted unless GIT_CRYPT_KEY
          # unlocked it above — treat a non-JSON file the same as a missing
          # one and fall back to the secret.
          if [ ! -f "$SEEDS_FILE" ] || ! python3 -m json.tool "$SEEDS_FILE" > /dev/null 2>&1; then
            if [ -n "$DB_SEEDS_SECRETS_JSON_B64" ]; then
              mkdir -p "$(dirname "$SEEDS_FILE")"
              printf '%s' "$DB_SEEDS_SECRETS_JSON_B64" | tr -d '\r\n\t ' | base64 -d > "$SEEDS_FILE"
            elif [ -n "$DB_SEEDS_SECRETS_JSON" ]; then
              mkdir -p "$(dirname "$SEEDS_FILE")"
              printf '%s' "$DB_SEEDS_SECRETS_JSON" > "$SEEDS_FILE"
            else
              echo "::notice::$SEEDS_FILE is absent/locked and DB_SEEDS_SECRETS_JSON_B64 is not configured; skipping secret seed upsert."
              exit 0
            fi
          fi
          python3 -m json.tool "$SEEDS_FILE" > /dev/null
          bun run --cwd backend seed:secrets
      - name: Close SSH ingress for this runner
        if: always()
        run: |
          if [ -n "${RUNNER_IP:-}" ]; then
            aws ec2 revoke-security-group-ingress \
              --group-id "${{ vars.GRAPH_DB_SSH_SG_ID }}" \
              --ip-permissions "[{\"IpProtocol\":\"tcp\",\"FromPort\":22,\"ToPort\":22,\"IpRanges\":[{\"CidrIp\":\"${RUNNER_IP}/32\"}]}]" \
              || echo "::warning::SSH ingress revoke failed; remove ${RUNNER_IP}/32 from the graph-db SG manually."
          fi

  # Rolling deploy of the backend api service. Replaces the former blue-green
  # SSH/scp/deploy-app.sh path on the standalone app EC2. The api task def
  # references <ecr>:latest, so force-new-deployment repulls the freshly pushed
  # image and ECS performs a rolling replacement (deploymentController ECS,
  # minimumHealthyPercent 100, per Terraform).
  backend-deploy:
    name: Roll api ECS service
    runs-on: ubuntu-latest
    needs: [changes, backend-image, backend-migrate]
    if: needs.changes.outputs.backend == 'true' && (github.event_name == 'pull_request' || inputs.deploy)
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Roll api ECS service
        run: |
          CLUSTER_STATUS=$(aws ecs describe-clusters \
            --clusters "$ECS_CLUSTER" \
            --query 'clusters[0].status' \
            --output text 2>/dev/null || echo INACTIVE)
          if [ "$CLUSTER_STATUS" != "ACTIVE" ]; then
            echo "::notice::Skipping ECS api rollout because cluster $ECS_CLUSTER is $CLUSTER_STATUS. Current production traffic is served by early-infra/Caddy."
            exit 0
          fi

          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_API_SERVICE" \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo INACTIVE)
          if [ "$SERVICE_STATUS" != "ACTIVE" ]; then
            echo "::notice::Skipping ECS api rollout because service $ECS_API_SERVICE is $SERVICE_STATUS. Current production traffic is served by early-infra/Caddy."
            exit 0
          fi

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_API_SERVICE" \
            --force-new-deployment \
            --query 'service.serviceName' --output text
          echo "Waiting for $ECS_API_SERVICE to reach a steady state..."
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_API_SERVICE"
      - name: External api health check
        if: vars.APP_HEALTH_URL != ''
        run: bash backend/deploy/health-check.sh "${{ vars.APP_HEALTH_URL }}"

  # Optional render worker (desired count is 0 by default). Registers a new task
  # definition revision with the freshly built image and rolls the service only
  # when the RENDER_TASK_FAMILY variable is configured.
  backend-render:
    name: Deploy backend render role
    runs-on: ubuntu-latest
    needs: [changes, backend-image, backend-migrate, backend-deploy]
    if: >-
      always() && needs.changes.outputs.backend == 'true'
      && (github.event_name == 'pull_request' || inputs.deploy)
      && needs.backend-migrate.result == 'success'
      && needs.backend-deploy.result != 'failure' && needs.backend-deploy.result != 'cancelled'
      && vars.RENDER_TASK_FAMILY != ''
    environment: production
    env:
      IMAGE: ${{ needs.backend-image.outputs.image }}
      FAMILY: ${{ vars.RENDER_TASK_FAMILY }}
      RENDER_ECS_CLUSTER: ${{ vars.RENDER_ECS_CLUSTER }}
      RENDER_ECS_SERVICE: ${{ vars.RENDER_ECS_SERVICE }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Register revision and optionally roll service
        run: |
          set -e
          FAMILY="$(python3 -c 'import os; print(os.environ["FAMILY"].lstrip("﻿").strip())')"
          RENDER_ECS_CLUSTER="$(python3 -c 'import os; print(os.environ["RENDER_ECS_CLUSTER"].lstrip("﻿").strip())')"
          RENDER_ECS_SERVICE="$(python3 -c 'import os; print(os.environ["RENDER_ECS_SERVICE"].lstrip("﻿").strip())')"
          export FAMILY RENDER_ECS_CLUSTER RENDER_ECS_SERVICE
          aws ecs describe-task-definition --task-definition "$FAMILY" --query 'taskDefinition' --output json > taskdef.json
          jq --arg IMAGE "$IMAGE" --arg AWS_REGION "$AWS_REGION" '
            .containerDefinitions |= map(
              if .name == "render" then
                .image = $IMAGE
                | .environment = (((.environment // []) | map(select(.name != "AWS_REGION"))) + [{name: "AWS_REGION", value: $AWS_REGION}])
              else
                .image = $IMAGE
              end
            )
            | .ephemeralStorage = {sizeInGiB: 30}
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
          ' taskdef.json > new-taskdef.json
          REV=$(aws ecs register-task-definition --cli-input-json file://new-taskdef.json --query 'taskDefinition.revision' --output text)
          echo "::notice::Registered $FAMILY:$REV with image $IMAGE"
          if [ -n "$RENDER_ECS_CLUSTER" ] && [ -n "$RENDER_ECS_SERVICE" ]; then
            # The render service is provisioned by infra.yml and may not exist
            # yet — registering the revision is the deploy's real job here.
            # ClusterNotFoundException also covers an INACTIVE cluster during
            # the early-infra era; production runs on the early box then.
            if ! out=$(aws ecs update-service --cluster "$RENDER_ECS_CLUSTER" --service "$RENDER_ECS_SERVICE" --task-definition "$FAMILY:$REV" --query 'service.serviceName' --output text 2>&1); then
              if echo "$out" | grep -Eq "ServiceNotFoundException|ClusterNotFoundException"; then
                echo "::warning::Render service $RENDER_ECS_SERVICE is not rollable yet (service or cluster missing/inactive); revision $FAMILY:$REV registered, service roll skipped."
              else
                echo "::error::Failed to roll render service: $out"
                exit 1
              fi
            fi
          fi

  # ---------------------------------------------------------------------------
  # EARLY-INFRA: while the ECS cluster is INACTIVE, production traffic is served
  # by the single-box early-infra stack. This job performs the same SSM
  # blue-green swap as early-infra.yml so every merge to main still reaches
  # production. It no-ops once the ECS cluster/service become ACTIVE — from
  # then on the ECS rollout steps above own the deploy.
  # ---------------------------------------------------------------------------
  early-deploy:
    name: Blue-green deploy to early-infra box
    runs-on: ubuntu-latest
    # deploy-web / backend-deploy no-op their ECS rollout while the cluster is
    # INACTIVE, but sequencing after them keeps the ordering correct in both
    # eras: images are pushed and DB migrations have run before the swap.
    needs: [changes, deploy-web, backend-deploy]
    if: >-
      always()
      && (needs.changes.outputs.web == 'true' || needs.changes.outputs.backend == 'true')
      && (github.event_name == 'pull_request' || inputs.deploy)
      && (needs.changes.outputs.web != 'true' || needs.deploy-web.result == 'success')
      && (needs.changes.outputs.backend != 'true' || needs.backend-deploy.result == 'success')
    environment: production
    env:
      APP_INSTANCE_TAG: vorinthex-early-app
      SITE_URL: ${{ fromJSON(secrets.CONFIG).vorinthex.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check whether ECS already serves production
        id: ecs
        run: |
          CLUSTER_STATUS=$(aws ecs describe-clusters \
            --clusters "$ECS_CLUSTER" \
            --query 'clusters[0].status' \
            --output text 2>/dev/null || echo INACTIVE)
          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_WEB_SERVICE" \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo INACTIVE)
          if [ "$CLUSTER_STATUS" = "ACTIVE" ] && [ "$SERVICE_STATUS" = "ACTIVE" ]; then
            echo "::notice::Cluster $ECS_CLUSTER and service $ECS_WEB_SERVICE are ACTIVE — production is served by ECS, skipping the early-infra blue-green swap."
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Blue-green deploy via SSM
        if: steps.ecs.outputs.active != 'true'
        env:
          WEB_CHANGED: ${{ needs.changes.outputs.web }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
        run: |
          set -euo pipefail
          # A changed service deploys the image this run pushed; an unchanged
          # one redeploys its most recent build (:latest, already live).
          WEB_TAG=latest
          API_TAG=latest
          if [ "$WEB_CHANGED" = "true" ]; then WEB_TAG="$COMMIT_SHA"; fi
          if [ "$BACKEND_CHANGED" = "true" ]; then API_TAG="$COMMIT_SHA"; fi
          echo "web tag: $WEB_TAG  api tag: $API_TAG"

          IID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${APP_INSTANCE_TAG}" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          if [ "$IID" = "None" ] || [ -z "$IID" ]; then
            echo "::error::Early-infra app box (tag Name=${APP_INSTANCE_TAG}) not found while the ECS cluster is INACTIVE — nothing would serve the new build."
            exit 1
          fi
          echo "app box: $IID"

          DEPLOY_B64=$(base64 -w0 deploy/early/deploy.sh)
          CADDY_B64=$(base64 -w0 deploy/early/Caddyfile.tmpl)

          CMD=$(aws ssm send-command \
            --instance-ids "$IID" \
            --document-name AWS-RunShellScript \
            --comment "unified-deploy early-infra blue-green $COMMIT_SHA" \
            --timeout-seconds 900 \
            --parameters commands="[
              \"set -e\",
              \"mkdir -p /opt/vorinthex\",
              \"echo $DEPLOY_B64 | base64 -d > /opt/vorinthex/deploy.sh\",
              \"echo $CADDY_B64 | base64 -d > /opt/vorinthex/Caddyfile.tmpl\",
              \"chmod +x /opt/vorinthex/deploy.sh\",
              \"/opt/vorinthex/deploy.sh $WEB_TAG $API_TAG\"
            ]" \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CMD"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD" --instance-id "$IID" --query 'Status' --output text 2>/dev/null || echo Pending)
            echo "status: $STATUS"
            case "$STATUS" in
              Success) break;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation --command-id "$CMD" --instance-id "$IID" --query 'StandardErrorContent' --output text || true
                exit 1;;
            esac
            sleep 10
          done
          aws ssm get-command-invocation --command-id "$CMD" --instance-id "$IID" --query 'StandardOutputContent' --output text | tail -30

      - name: Web health smoke check
        if: steps.ecs.outputs.active != 'true'
        run: |
          URL="${SITE_URL:-https://www.vorinthex.com}"
          for i in $(seq 1 24); do
            CODE=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Web is live (HTTP 200) at $URL on attempt $i/24"
              exit 0
            fi
            echo "attempt $i/24: HTTP $CODE; retrying in 10s"
            sleep 10
          done
          echo "::error::Web health check failed after 4 minutes ($URL)"
          exit 1

  # ---------------------------------------------------------------------------
  # Also invokes the standalone early-infra.yml workflow on every merge — a
  # second, independent build + blue-green swap against the same early-infra
  # box, from its own freshly-built images rather than the ones early-deploy
  # above already pushed. This deliberately duplicates early-deploy (which
  # already performs the same swap using this run's images and per-service
  # tag selection); the two are not sequenced against each other.
  # ---------------------------------------------------------------------------
  early-infra-standalone:
    name: Early-infra deploy (standalone workflow)
    needs: [changes]
    if: >-
      (needs.changes.outputs.web == 'true' || needs.changes.outputs.backend == 'true')
      && (github.event_name == 'pull_request' || inputs.deploy)
    uses: ./.github/workflows/early-infra.yml
    with:
      image_tag: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
    secrets: inherit

  deploy-summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true)
    needs: [changes, deploy-web, cloudflare-cache, backend-deploy, backend-render, early-deploy, early-infra-standalone]
    steps:
      - name: Write deploy audit
        run: |
          {
            echo "## Vorinthex deploy audit"
            echo ""
            echo "| Service | Selected | Result |"
            echo "|---|---:|---|"
            echo "| web (ECS vorinthex-prod-web) | ${{ needs.changes.outputs.web }} | ${{ needs.deploy-web.result }} |"
            echo "| cloudflare cache | ${{ needs.changes.outputs.web }} | ${{ needs.cloudflare-cache.result }} |"
            echo "| api (ECS vorinthex-prod-api) | ${{ needs.changes.outputs.backend }} | ${{ needs.backend-deploy.result }} |"
            echo "| render | ${{ needs.changes.outputs.backend }} | ${{ needs.backend-render.result }} |"
            echo "| early-infra box (SSM blue-green) | ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.backend == 'true' }} | ${{ needs.early-deploy.result }} |"
            echo "| early-infra box (standalone workflow) | ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.backend == 'true' }} | ${{ needs.early-infra-standalone.result }} |"
            echo ""
            echo "### Changed files"
            echo '```'
            echo "${{ needs.changes.outputs.changed_files }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
