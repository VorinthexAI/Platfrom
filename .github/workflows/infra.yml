name: Production Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        type: choice
        options: [plan, apply]
        default: plan
      instance_type:
        description: 'Optional app EC2 instance type override'
        required: false
        type: string
      graph_db_instance_type:
        description: 'Optional graph-db EC2 instance type override'
        required: false
        type: string
      graph_db_volume_size:
        description: 'Optional graph-db EBS data volume size (GiB) override'
        required: false
        type: string
      task_cpu:
        description: 'Optional render task CPU override'
        required: false
        type: string
      task_memory:
        description: 'Optional render task memory override'
        required: false
        type: string
      redis_node_type:
        description: 'Optional Redis node type override'
        required: false
        type: string
      ssh_ingress_cidr_blocks:
        description: 'Optional SSH ingress CIDRs as a JSON list, e.g. ["1.2.3.4/32"]. Empty = no SSH (SSM only).'
        required: false
        type: string
      app_ami_id:
        description: 'Optional pinned AMI id for the app host (blank = AL2023 latest, protected by ignore_changes)'
        required: false
        type: string
      graph_db_ami_id:
        description: 'Optional pinned AMI id for the graph-db host (blank = AL2023 latest, protected by ignore_changes)'
        required: false
        type: string
      enable_app_platform:
        description: 'Create the additive ALB + ECS EC2 web/api + CloudFront target-state platform'
        required: false
        type: boolean
        default: false
      run_dns_sync:
        description: 'Also run the Cloudflare DNS sync (domains.json -> proxied CNAMEs at the CloudFront target)'
        required: false
        type: boolean
        default: false
      dns_dry_run:
        description: 'DNS sync dry-run: log planned Cloudflare changes without applying them'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: infra-production
  cancel-in-progress: false

env:
  AWS_REGION: eu-north-1
  TF_WORKING_DIR: terraform/environments/production
  TF_VAR_aws_region: eu-north-1
  TF_VAR_instance_type: ${{ inputs.instance_type || vars.PROD_INSTANCE_TYPE || 't3.small' }}
  TF_VAR_graph_db_instance_type: ${{ inputs.graph_db_instance_type || vars.PROD_GRAPH_DB_INSTANCE_TYPE || 't3.small' }}
  TF_VAR_graph_db_volume_size: ${{ inputs.graph_db_volume_size || vars.PROD_GRAPH_DB_VOLUME_SIZE || '30' }}
  TF_VAR_task_cpu: ${{ inputs.task_cpu || vars.PROD_TASK_CPU || '1024' }}
  TF_VAR_task_memory: ${{ inputs.task_memory || vars.PROD_TASK_MEMORY || '2048' }}
  TF_VAR_redis_node_type: ${{ inputs.redis_node_type || vars.PROD_REDIS_NODE_TYPE || 'cache.t4g.micro' }}
  TF_VAR_s3_bucket_name: ${{ vars.PROD_S3_BUCKET_NAME }}
  TF_VAR_ssm_parameter_prefix: ${{ vars.SSM_PARAMETER_PREFIX || 'vorinthex/prod' }}
  # Additive: SSH ingress is a JSON list; default '[]' matches the new safe
  # (no world-open SSH) Terraform default. Set the input or PROD_SSH_INGRESS_CIDR_BLOCKS
  # to a JSON list to allow SSH again before an apply that still deploys via SSH.
  TF_VAR_ssh_ingress_cidr_blocks: ${{ inputs.ssh_ingress_cidr_blocks || vars.PROD_SSH_INGRESS_CIDR_BLOCKS || '[]' }}
  TF_VAR_app_ami_id: ${{ inputs.app_ami_id || vars.PROD_APP_AMI_ID || '' }}
  TF_VAR_graph_db_ami_id: ${{ inputs.graph_db_ami_id || vars.PROD_GRAPH_DB_AMI_ID || '' }}
  TF_VAR_enable_app_platform: ${{ inputs.enable_app_platform || vars.PROD_ENABLE_APP_PLATFORM || 'false' }}

jobs:
  terraform:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Validate required variables
        run: |
          test -n "${{ vars.AWS_INFRA_ROLE_ARN }}" || { echo "::error::AWS_INFRA_ROLE_ARN variable is required"; exit 1; }
          test -n "${{ vars.TF_STATE_BUCKET }}" || { echo "::error::TF_STATE_BUCKET variable is required"; exit 1; }
          test -n "${{ vars.PROD_S3_BUCKET_NAME }}" || { echo "::error::PROD_S3_BUCKET_NAME variable is required"; exit 1; }

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=vorinthex/production/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_STATE_REGION || env.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive ../..

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Deployment handoff outputs
        if: inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          {
            echo "## Production infrastructure outputs"
            echo ""
            echo "| GitHub name | Terraform output |"
            echo "|---|---|"
            echo "| APP_HEALTH_URL | $(terraform output -raw app_health_url) |"
            echo "| GRAPH_DB_EC2_HOST | $(terraform output -raw graph_db_ec2_host) |"
            echo "| GRAPH_DB_EC2_USER | $(terraform output -raw graph_db_ec2_user) |"
            echo ""
            echo "GRAPH_DB_EC2_SSH_KEY is sensitive. Retrieve it from Terraform state only in a secure shell:"
            echo ""
            echo '```bash'
            echo "terraform -chdir=terraform/environments/production output -raw graph_db_ec2_ssh_private_key"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  cloudflare-dns:
    name: Cloudflare DNS sync
    if: ${{ inputs.run_dns_sync }}
    # Deliberately independent of the terraform job so DNS sync never blocks or
    # is blocked by plan/apply. It only reads the committed environments/domains.json.
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare credentials
        id: check
        # secrets/vars are not available in job-level `if`, so gate here and
        # skip gracefully (without failing the workflow) when unset.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "::warning::Skipping Cloudflare DNS sync: set the CLOUDFLARE_API_TOKEN secret and CLOUDFLARE_ZONE_ID variable to enable it."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.check.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set Cloudflare SSL mode
        # The early-infra app box serves HTTPS on :443 with a self-signed internal
        # cert, so the zone must be "full" (Cloudflare re-encrypts to the origin).
        # NOT "flexible" — Caddy redirects :80→:443 for named hosts, so a flexible
        # (HTTP-to-origin) zone would redirect-loop. Override with vars.CLOUDFLARE_SSL_MODE.
        if: ${{ steps.check.outputs.skip != 'true' && !inputs.dns_dry_run }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          SSL_MODE: ${{ vars.CLOUDFLARE_SSL_MODE || 'full' }}
        run: |
          curl -fsS -X PATCH "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/settings/ssl" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json" \
            -d "{\"value\":\"$SSL_MODE\"}" | head -c 300; echo

      - name: Sync Cloudflare DNS
        if: steps.check.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_DNS_TARGET: ${{ vars.CLOUDFLARE_DNS_TARGET || 'ec2-13-49-39-46.eu-north-1.compute.amazonaws.com' }}
          DNS_APEX: ${{ vars.DNS_APEX || 'vorinthex.com' }}
          DRY_RUN: ${{ inputs.dns_dry_run && '1' || '0' }}
        run: bun environments/scripts/cloudflare-dns-sync.ts
