services:
  arangodb:
    image: arangodb/arangodb:3.12
    ports:
      - '8529:8529'
    environment:
      ARANGO_ROOT_PASSWORD: vorinthex
    volumes:
      - arangodata:/var/lib/arangodb3
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8529/_api/version || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: gresau/localstack-persist:3
    ports:
      - '4566:4566'
    environment:
      SERVICES: s3,sqs
      DEFAULT_REGION: eu-north-1
      EAGER_SERVICE_LOADING: 1
      PERSIST_DEFAULT: 0
      PERSIST_S3: 1
      EXTRA_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      DISABLE_CORS_CHECKS: 1
    volumes:
      - './scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh'
      - localstack-data:/persisted-data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4566/_localstack/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025'
      - '8025:8025'
    restart: unless-stopped

  app:
    profiles: ['services']
    build:
      context: ..
      dockerfile: backend/deploy/Dockerfile
      target: dev
    command: ['--hot', 'src/api/index.ts']
    environment:
      ROLE: app
      NODE_ENV: development
      SHARED_DIR: /shared
      ARANGO_URL: http://arangodb:8529
      ARANGO_DATABASE: vorinthex
      ARANGO_USERNAME: root
      ARANGO_ROOT_PASSWORD: vorinthex
      REDIS_URL: redis://redis:6379
      AWS_REGION: eu-north-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_BUCKET: vorinthex-dev
      SQS_QUEUE_URL: http://sqs.eu-north-1.localhost.localstack.cloud:4566/000000000000/vorinthex-file-events
    env_file: .env
    ports:
      - '3001:3001'
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
      - ../shared:/shared:ro
    depends_on:
      arangodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

  render:
    profiles: ['services']
    build:
      context: ..
      dockerfile: backend/deploy/Dockerfile
      target: dev
    command: ['--hot', 'src/render-worker/index.ts']
    environment:
      ROLE: render
      NODE_ENV: development
      SHARED_DIR: /shared
      ARANGO_URL: http://arangodb:8529
      ARANGO_DATABASE: vorinthex
      ARANGO_USERNAME: root
      ARANGO_ROOT_PASSWORD: vorinthex
      REDIS_URL: redis://redis:6379
      AWS_REGION: eu-north-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_BUCKET: vorinthex-dev
      SQS_QUEUE_URL: http://sqs.eu-north-1.localhost.localstack.cloud:4566/000000000000/vorinthex-file-events
    env_file: .env
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
      - ../shared:/shared:ro
    depends_on:
      arangodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  arangodata:
  redisdata:
  localstack-data:
