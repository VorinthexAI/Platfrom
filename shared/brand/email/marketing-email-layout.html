<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="x-apple-disable-message-reformatting">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="color-scheme" content="dark">
    <meta name="supported-color-schemes" content="dark">
    <title>{{subject}}</title>
    <style>
      :root {
        color-scheme: dark;
        supported-color-schemes: dark;
      }

      @media screen and (max-width: 620px) {
        .vtx-shell {
          width: 100% !important;
          max-width: 100% !important;
        }

        .vtx-panel {
          padding: 34px 22px !important;
        }

        .vtx-title {
          font-size: 27px !important;
          line-height: 1.16 !important;
        }
      }
    </style>
  </head>
  <body style="margin:0; padding:0; background:#030507; background-color:#030507; color:#dde2e5; font-family:'Helvetica Neue', Helvetica, Arial, 'Segoe UI', sans-serif;">
    <div style="display:none; max-height:0; overflow:hidden; opacity:0; color:transparent; line-height:1px;">
      {{preheader}}
    </div>

    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#030507; background-color:#030507; margin:0; padding:0; width:100%;">
      <tr>
        <td align="center" style="padding:48px 16px;">
          <table class="vtx-shell" role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="width:600px; max-width:600px; table-layout:fixed;">
            <tr>
              <td style="padding:0 0 22px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td align="left" style="font-size:16px; line-height:1.2; font-weight:600; color:#f5f7f8; letter-spacing:0.24em; text-transform:uppercase;">
                      Vorinthex
                    </td>
                    <td align="right" style="font-family:Consolas, Menlo, 'Courier New', monospace; font-size:11px; line-height:1.2; font-weight:500; color:#7b858c; letter-spacing:0.22em; text-transform:uppercase;">
                      {{label}}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td class="vtx-panel" style="background:#0d1117; background-color:#0d1117; background-image:linear-gradient(180deg, #141922 0%, #0a0e13 100%); border:1px solid rgba(221,226,229,0.14); border-radius:20px; padding:46px 44px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="font-family:Consolas, Menlo, 'Courier New', monospace; font-size:11px; line-height:1.2; font-weight:600; color:#aeb6bc; letter-spacing:0.22em; text-transform:uppercase; padding:0 0 22px;">
                      {{eyebrow}}
                    </td>
                  </tr>
                  <tr>
                    <td class="vtx-title" style="font-size:32px; line-height:1.12; font-weight:600; color:#f5f7f8; letter-spacing:0; padding:0 0 22px;">
                      {{headline}}
                    </td>
                  </tr>
                  <tr>
                    <td style="font-size:16px; line-height:1.65; font-weight:400; color:#dde2e5; padding:0;">
                      {{body_html}}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td style="padding:24px 0 0; color:#7b858c; font-size:13px; line-height:1.55;">
                {{footer_html}}
              </td>
            </tr>

            <tr>
              <td style="padding:14px 0 0; color:#7b858c; font-size:12px; line-height:1.5;">
                {{unsubscribe_html}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
