<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="x-apple-disable-message-reformatting">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>{{subject}}</title>
    <style>
      @media screen and (max-width: 620px) {
        .vtx-shell {
          width: 100% !important;
          max-width: 100% !important;
        }

        .vtx-panel {
          padding: 32px 22px !important;
        }

        .vtx-title {
          font-size: 32px !important;
          line-height: 1.08 !important;
        }
      }
    </style>
  </head>
  <body style="margin:0; padding:0; background:var(--vtx-color-page, #faf7f2); color:var(--vtx-color-text, #1c1a17); font-family:var(--vtx-font-serif, Georgia, Cambria, 'Times New Roman', serif);">
    <div style="display:none; max-height:0; overflow:hidden; opacity:0; color:transparent; line-height:1px;">
      {{preheader}}
    </div>

    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:var(--vtx-color-page, #faf7f2); margin:0; padding:0; width:100%;">
      <tr>
        <td align="center" style="padding:40px 16px;">
          <table class="vtx-shell" role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="width:600px; max-width:600px; table-layout:fixed;">
            <tr>
              <td style="padding:0 0 18px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td align="left" style="font-size:19px; line-height:1.2; font-weight:500; color:var(--vtx-color-text, #1c1a17); letter-spacing:0;">
                      Vorinthex
                    </td>
                    <td align="right" style="font-size:12px; line-height:1.2; font-weight:500; color:var(--vtx-color-muted, #6b6358); letter-spacing:0.18em; text-transform:uppercase;">
                      {{label}}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td class="vtx-panel" style="background:var(--vtx-color-surface, #ffffff); border:1px solid var(--vtx-color-border, #e3dcd0); border-radius:var(--vtx-radius-lg, 12px); padding:44px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="font-size:13px; line-height:1.2; font-weight:500; color:var(--vtx-color-accent, #8b6f47); letter-spacing:0.18em; text-transform:uppercase; padding:0 0 18px;">
                      {{eyebrow}}
                    </td>
                  </tr>
                  <tr>
                    <td class="vtx-title" style="font-size:40px; line-height:1.06; font-weight:400; color:var(--vtx-color-text, #1c1a17); letter-spacing:0; padding:0 0 20px;">
                      {{headline}}
                    </td>
                  </tr>
                  <tr>
                    <td style="font-size:17px; line-height:1.58; font-weight:400; color:var(--vtx-color-text, #1c1a17); padding:0;">
                      {{body_html}}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td style="padding:22px 0 0; color:var(--vtx-color-muted, #6b6358); font-size:13px; line-height:1.55;">
                {{footer_html}}
              </td>
            </tr>

            <tr>
              <td style="padding:14px 0 0; color:var(--vtx-color-muted, #6b6358); font-size:12px; line-height:1.5;">
                {{unsubscribe_html}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
